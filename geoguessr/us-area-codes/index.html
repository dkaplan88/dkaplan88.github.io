<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>US Area Code Quiz - Dan Kaplan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      line-height: 1.6;
      color: #1a1a2e;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    .back-link {
      display: inline-block;
      margin-bottom: 24px;
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95rem;
    }
    .back-link:hover { color: #fff; text-decoration: underline; }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }
    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 4px;
      letter-spacing: -0.02em;
    }
    .subtitle {
      color: #64648c;
      font-size: 0.9rem;
      margin-bottom: 28px;
    }

    /* Stats bar */
    .stats {
      display: flex;
      gap: 16px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .stat {
      background: #f5f3ff;
      border-radius: 10px;
      padding: 10px 16px;
      flex: 1;
      min-width: 80px;
      text-align: center;
    }
    .stat-value {
      font-size: 1.3rem;
      font-weight: 700;
      color: #6366f1;
    }
    .stat-label {
      font-size: 0.7rem;
      color: #64648c;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }

    /* Mode toggle */
    .mode-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }
    .mode-btn {
      flex: 1;
      padding: 10px;
      border: 2px solid #e2e0f0;
      border-radius: 10px;
      background: #fff;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      color: #64648c;
      cursor: pointer;
      transition: all 0.2s;
    }
    .mode-btn.active {
      border-color: #6366f1;
      background: #f5f3ff;
      color: #6366f1;
    }
    .mode-btn:hover:not(.active) {
      border-color: #c4b5fd;
    }

    /* Question area */
    .question-area {
      text-align: center;
      margin-bottom: 28px;
    }
    .area-code {
      font-size: 4rem;
      font-weight: 800;
      color: #6366f1;
      letter-spacing: -0.03em;
      line-height: 1.1;
    }
    .question-label {
      font-size: 0.85rem;
      color: #64648c;
      margin-top: 4px;
    }
    .location-prompt {
      font-size: 1.8rem;
      font-weight: 700;
      color: #6366f1;
      line-height: 1.2;
    }

    /* Answer choices */
    .choices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }
    .choice-btn {
      padding: 14px 12px;
      border: 2px solid #e2e0f0;
      border-radius: 10px;
      background: #fff;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 500;
      color: #1a1a2e;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }
    .choice-btn:hover:not(:disabled) {
      border-color: #6366f1;
      background: #f5f3ff;
    }
    .choice-btn:disabled { cursor: default; }
    .choice-btn.correct {
      border-color: #22c55e;
      background: #f0fdf4;
      color: #166534;
    }
    .choice-btn.wrong {
      border-color: #ef4444;
      background: #fef2f2;
      color: #991b1b;
    }
    .choice-btn.reveal {
      border-color: #22c55e;
      background: #f0fdf4;
      color: #166534;
    }

    /* Feedback */
    .feedback {
      text-align: center;
      min-height: 24px;
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 16px;
    }
    .feedback.correct-fb { color: #22c55e; }
    .feedback.wrong-fb { color: #ef4444; }

    /* Map */
    .map-container {
      display: none;
      margin-bottom: 20px;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid #e2e0f0;
    }
    .map-container.visible { display: block; }
    #map {
      height: 240px;
      width: 100%;
    }
    .map-label {
      text-align: center;
      padding: 8px;
      font-size: 0.78rem;
      color: #64648c;
      background: #f9fafb;
      font-weight: 500;
    }

    /* Next button */
    .next-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      display: none;
    }
    .next-btn:hover { opacity: 0.9; }
    .next-btn.visible { display: block; }

    /* Filter bar */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .filter-bar label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #64648c;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .filter-bar select {
      flex: 1;
      padding: 8px 12px;
      border: 2px solid #e2e0f0;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.85rem;
      color: #1a1a2e;
      background: #fff;
      cursor: pointer;
    }

    @media (max-width: 500px) {
      .card { padding: 24px; }
      .area-code { font-size: 3rem; }
      .location-prompt { font-size: 1.4rem; }
      .choices { grid-template-columns: 1fr; }
      .stats { gap: 8px; }
      .stat { padding: 8px 10px; }
      #map { height: 200px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="../../index.html" class="back-link">&larr; Back to Home</a>
    <div class="card">
      <h1>US Area Code Quiz</h1>
      <p class="subtitle">Learn US phone area codes for GeoGuessr</p>

      <div class="stats">
        <div class="stat">
          <div class="stat-value" id="score">0</div>
          <div class="stat-label">Score</div>
        </div>
        <div class="stat">

          <div class="stat-label">Streak</div>
        </div>
        <div class="stat">

        </div>
        <div class="stat">
          <div class="stat-value" id="pct">0%</div>
          <div class="stat-label">Accuracy</div>
        </div>
      </div>

      <div class="mode-toggle">
        <button class="mode-btn active" data-mode="code-to-place">Code &rarr; Place</button>
        <button class="mode-btn" data-mode="place-to-code">Place &rarr; Code</button>
      </div>

      <div class="filter-bar">
        <label>Region:</label>
        <select id="region-filter">

          <option value="Northeast">Northeast</option>
          <option value="Southeast">Southeast</option>
          <option value="Midwest">Midwest</option>
          <option value="Southwest">Southwest</option>
          <option value="West">West</option>
        </select>
      </div>

      <div class="question-area" id="question-area">

        <div class="question-label" id="question-label">Where is this area code?</div>
      </div>

      <div class="choices" id="choices"></div>
      <div class="feedback" id="feedback"></div>

      <div class="map-container" id="map-container">
        <div id="map"></div>
        <div class="map-label" id="map-label"></div>
      </div>

      <button class="next-btn" id="next-btn">Next Question &rarr;</button>
    </div>
  </div>

// Game state
let mode = 'code-to-place';
let regionFilter = 'all';
let currentQuestion = null;
let score = 0;
let streak = 0;
let bestStreak = 0;
let total = 0;
let answered = false;
let map = null;
let marker = null;

// DOM elements
const scoreEl = document.getElementById('score');
const streakEl = document.getElementById('streak');
const totalEl = document.getElementById('total');
const pctEl = document.getElementById('pct');
const questionArea = document.getElementById('question-area');
const choicesEl = document.getElementById('choices');
const feedbackEl = document.getElementById('feedback');
const nextBtn = document.getElementById('next-btn');
const regionSelect = document.getElementById('region-filter');
const mapContainer = document.getElementById('map-container');
const mapLabel = document.getElementById('map-label');

// Initialize Leaflet map
function initMap() {
  map = L.map('map', {
    zoomControl: false,
    attributionControl: false,
    dragging: false,
    scrollWheelZoom: false,
    doubleClickZoom: false,
    touchZoom: false
  }).setView([39.8, -98.6], 4);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 12
  }).addTo(map);
  L.control.attribution({prefix: false}).addAttribution('&copy; <a href="https://openstreetmap.org">OSM</a>').addTo(map);
}

function showMap(lat, lng, label) {
  mapContainer.classList.add('visible');
  if (!map) initMap();

  // Remove old marker
  if (marker) map.removeLayer(marker);

  const customIcon = L.divIcon({
    className: 'custom-pin',
    html: '<div style="width:14px;height:14px;background:#6366f1;border:3px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,0.35);"></div>',
    iconSize: [14, 14],
    iconAnchor: [7, 7]
  });

  marker = L.marker([lat, lng], {icon: customIcon}).addTo(map);

  // For Hawaii/Alaska zoom out more, otherwise zoom to 6
  const isRemote = (lat < 25 || lat > 55 || lng < -130);
  const zoom = isRemote ? 4 : 6;
  map.setView([lat, lng], zoom);

  mapLabel.textContent = label;

  // Need to invalidate size since container was hidden
  setTimeout(() => map.invalidateSize(), 50);
}

function hideMap() {
  mapContainer.classList.remove('visible');
}

// Mode toggle
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    resetGame();
  });
});

regionSelect.addEventListener('change', () => {
  regionFilter = regionSelect.value;
  resetGame();
});

nextBtn.addEventListener('click', () => newQuestion());

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (answered && (e.key === 'Enter' || e.key === ' ')) {
    e.preventDefault();
    newQuestion();
    return;
  }
  if (!answered && currentQuestion) {
    const num = parseInt(e.key);
    if (num >= 1 && num <= 4) {
      const btns = choicesEl.querySelectorAll('.choice-btn');
      if (btns[num - 1]) btns[num - 1].click();
    }
  }
});

function getFilteredCodes() {
  if (regionFilter === 'all') return AREA_CODES;
  return AREA_CODES.filter(ac => ac.region === regionFilter);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickRandom(arr, n) {
  return shuffle(arr).slice(0, n);
}

function newQuestion() {
  answered = false;
  feedbackEl.textContent = '';
  feedbackEl.className = 'feedback';
  nextBtn.classList.remove('visible');
  hideMap();

  const pool = getFilteredCodes();
  if (pool.length < 4) {
    choicesEl.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:#64648c;">Not enough area codes in this region. Try "All US".</p>';
    return;
  }

  const correct = pool[Math.floor(Math.random() * pool.length)];
  const wrongPool = pool.filter(ac => ac.state !== correct.state);
  const fallbackPool = pool.filter(ac => ac.code !== correct.code);
  const sourcePool = wrongPool.length >= 3 ? wrongPool : fallbackPool;
  const wrongs = pickRandom(sourcePool.filter(ac => ac.code !== correct.code), 3);
  const options = shuffle([correct, ...wrongs]);

  currentQuestion = { correct, options };

  if (mode === 'code-to-place') {
    questionArea.innerHTML = `
      <div class="area-code">(${correct.code})</div>
      <div class="question-label">Where is this area code?</div>
    `;
    choicesEl.innerHTML = options.map((o, i) =>
      `<button class="choice-btn" data-code="${o.code}"><span style="opacity:0.4;font-size:0.75rem;">${i+1}. </span>${o.place}</button>`
    ).join('');
  } else {
    questionArea.innerHTML = `
      <div class="location-prompt">${correct.place}</div>
      <div class="question-label">What is the area code?</div>
    `;
    choicesEl.innerHTML = options.map((o, i) =>
      `<button class="choice-btn" data-code="${o.code}"><span style="opacity:0.4;font-size:0.75rem;">${i+1}. </span>(${o.code})</button>`
    ).join('');
  }

  choicesEl.querySelectorAll('.choice-btn').forEach(btn => {
    btn.addEventListener('click', () => handleAnswer(btn));
  });
}

function handleAnswer(btn) {
  if (answered) return;
  answered = true;

  const selectedCode = btn.dataset.code;
  const correct = currentQuestion.correct;
  const isCorrect = selectedCode === correct.code;

  if (isCorrect) {
    score++;
    streak++;
    if (streak > bestStreak) bestStreak = streak;
    btn.classList.add('correct');
    feedbackEl.textContent = 'Correct!';
    feedbackEl.className = 'feedback correct-fb';
  } else {
    streak = 0;
    btn.classList.add('wrong');
    feedbackEl.textContent = `Nope! It's ${correct.place} (${correct.code})`;
    feedbackEl.className = 'feedback wrong-fb';
    choicesEl.querySelectorAll('.choice-btn').forEach(b => {
      if (b.dataset.code === correct.code) b.classList.add('reveal');
    });
  }

  total++;
  choicesEl.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
  updateStats();

  // Show map with pin on the correct location
  showMap(correct.lat, correct.lng, `(${correct.code}) — ${correct.place}`);

  nextBtn.classList.add('visible');
}

function updateStats() {
  scoreEl.textContent = score;
  streakEl.textContent = streak;
  totalEl.textContent = total;
  pctEl.textContent = total === 0 ? '0%' : Math.round((score / total) * 100) + '%';
}

function resetGame() {
  score = 0;
  streak = 0;
  total = 0;
  updateStats();
  newQuestion();
}

// Start
newQuestion();
</script>
</body>
</html>
